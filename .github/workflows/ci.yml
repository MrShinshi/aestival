name: CI

on:
  push:
    branches: [master, main, develop, shinshi]
  pull_request:
    branches: [master, main]

# Serialize deployments — a new push waits behind the running one so deploy
# steps never race.  Matrix jobs within a single push all run in parallel.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Detect which subsystems changed ─────────────────────────────────────
  changes:
    name: analyze changes
    runs-on: ubuntu-latest
    timeout-minutes: 1

    outputs:
      cpp: ${{ steps.detect.outputs.cpp }}
      webui: ${{ steps.detect.outputs.webui }}
      backend_deps: ${{ steps.detect.outputs.backend_deps }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # we need the 'before' commit for git diff

      - name: Detect
        id: detect
        shell: bash
        run: |
          # PR: always run everything.
          if [ '${{ github.event_name }}' = 'pull_request' ]; then
            echo 'cpp=true'           >> "$GITHUB_OUTPUT"
            echo 'webui=true'         >> "$GITHUB_OUTPUT"
            echo 'backend_deps=true'  >> "$GITHUB_OUTPUT"
            echo ':: PR — running full build'
            exit 0
          fi

          # Push: diff against the previous commit to skip unaffected jobs.
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }})
          echo ':: changed files:'
          echo "$CHANGED" | sed 's/^/  /'

          has() { echo "$CHANGED" | grep -qE "$1" && echo true || echo false; }

          cpp=$(has '^(app|core|platform)/|^CMakeLists\.txt$|^vcpkg\.json$|^cmake/')
          webui=$(has '^webui/')
          deps=$(has '^webui/backend/package-lock\.json$')

          echo ":: cpp=$cpp  webui=$webui  deps=$deps"
          echo "cpp=${cpp}"           >> "$GITHUB_OUTPUT"
          echo "webui=${webui}"       >> "$GITHUB_OUTPUT"
          echo "backend_deps=${deps}" >> "$GITHUB_OUTPUT"

  # ─── C++ builds (full matrix, selective on push, always on PR) ───────────
  cpp-build:
    name: ${{ matrix.os }} · ${{ matrix.compiler }} · ${{ matrix.build_type }}
    needs: changes
    if: |
      github.event_name == 'pull_request' ||
      needs.changes.outputs.cpp == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            compiler: msvc
            build_type: Release
          - os: ubuntu-latest
            compiler: gcc
            build_type: Release
          - os: ubuntu-latest
            compiler: clang
            build_type: Release
          - os: macos-latest
            compiler: apple-clang
            build_type: Release

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        if: runner.os == 'Windows' && matrix.compiler == 'msvc'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Clang (Linux)
        if: runner.os == 'Linux' && matrix.compiler == 'clang'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang

      - name: Setup GCC 14 (Linux)
        if: runner.os == 'Linux' && matrix.compiler == 'gcc'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq g++-14
          echo "CC=gcc-14" >> $GITHUB_ENV
          echo "CXX=g++-14" >> $GITHUB_ENV

      # ── vcpkg dependency cache ────────────────────────────────────────
      #
      # Three-tier caching so only truly-new work pays the full cost:
      #   1. installed/  — final built packages (restored → configure is instant)
      #   2. downloads/  — source tarballs (avoids re-fetching Boost etc.)
      #   3. buildtrees/ — intermediate objects (avoids recompiling deps)
      #
      # When vcpkg.json changes → tier 1 misses → vcpkg rebuilds deps.
      # Tiers 2+3 make that rebuild MUCH faster (no download, no recompile
      # of unchanged packages).  Without them every cache miss means
      # re-downloading AND recompiling ALL of Boost on Windows — 20+ min.
      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-
            vcpkg-${{ runner.os }}-${{ matrix.compiler }}-

      - name: Cache vcpkg downloads
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.vcpkg-cache/downloads
          key: vcpkg-dl-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-dl-${{ runner.os }}-

      # ── CMake download cache ────────────────────────────────────────────
      #
      # CMake 4.3.3 zip is ~40 MB; downloading it on 6×Windows runs per
      # push adds up.  Cache the expanded directory keyed by version.
      - name: Cache CMake
        id: cache-cmake
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cmake-cache
          key: cmake-4.3.3-${{ runner.os }}

      - name: Install CMake 4.3.3 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cache = Join-Path $env:GITHUB_WORKSPACE .cmake-cache\cmake-4.3.3-windows-x86_64
          if (-not (Test-Path "$cache\bin\cmake.exe")) {
            $url = 'https://github.com/Kitware/CMake/releases/download/v4.3.3/cmake-4.3.3-windows-x86_64.zip'
            $zip = Join-Path $env:RUNNER_TEMP cmake-4.3.3-windows-x86_64.zip
            Invoke-WebRequest -Uri $url -OutFile $zip
            New-Item -ItemType Directory -Force -Path (Split-Path $cache -Parent)
            Expand-Archive -Path $zip -DestinationPath (Split-Path $cache -Parent) -Force
            Remove-Item $zip
          }
          echo "$cache\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install CMake 4.3.3 (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          case "${{ runner.os }}" in
            Linux)  archive=cmake-4.3.3-linux-x86_64 ;;
            macOS)  archive=cmake-4.3.3-macos-universal ;;
          esac
          root="$GITHUB_WORKSPACE/.cmake-cache/$archive"
          if [ ! -x "$root/bin/cmake" ]; then
            url="https://github.com/Kitware/CMake/releases/download/v4.3.3/$archive.tar.gz"
            tarball="$RUNNER_TEMP/$archive.tar.gz"
            curl -fsSL "$url" -o "$tarball"
            mkdir -p "$(dirname "$root")"
            tar -xzf "$tarball" -C "$(dirname "$root")"
            rm "$tarball"
          fi
          echo "$root/bin" >> "$GITHUB_PATH"

      - name: Verify CMake
        shell: bash
        run: cmake --version

      - name: Prepare vcpkg
        shell: bash
        run: |
          if [[ -n "${VCPKG_INSTALLATION_ROOT:-}" ]]; then
            printf 'VCPKG_ROOT=%s\n' "$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"
            if [[ -d "$VCPKG_INSTALLATION_ROOT/.git" ]]; then
              git -C "$VCPKG_INSTALLATION_ROOT" reset --hard
              git -C "$VCPKG_INSTALLATION_ROOT" clean -fdx
              git -C "$VCPKG_INSTALLATION_ROOT" fetch origin master --tags --prune
              git -C "$VCPKG_INSTALLATION_ROOT" checkout -B master FETCH_HEAD
            fi
          fi
          # Point vcpkg to the persistent downloads cache so even when the
          # installed/ cache misses, we skip re-downloading Boost etc.
          mkdir -p "$GITHUB_WORKSPACE/.vcpkg-cache/downloads"
          printf 'VCPKG_DOWNLOADS=%s/.vcpkg-cache/downloads\n' "$GITHUB_WORKSPACE" >> "$GITHUB_ENV"

      - name: Configure
        shell: bash
        run: |
          GENERATOR_ARGS=()

          case "${{ runner.os }}" in
            Windows)
              case "${{ matrix.compiler }}" in
                clang-cl) GENERATOR_ARGS+=(-T ClangCL) ;;
              esac
              ;;
            Linux)
              case "${{ matrix.compiler }}" in
                clang)
                  GENERATOR_ARGS+=(-DCMAKE_C_COMPILER=clang)
                  GENERATOR_ARGS+=(-DCMAKE_CXX_COMPILER=clang++)
                  ;;
                gcc)
                  GENERATOR_ARGS+=(-DCMAKE_C_COMPILER=gcc-14)
                  GENERATOR_ARGS+=(-DCMAKE_CXX_COMPILER=g++-14)
                  ;;
              esac
              ;;
          esac

          cmake -B build \
            -DCMAKE_PROJECT_NAME=aestival \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DAESTIVAL_WERROR=ON \
            -DVCPKG_BOOTSTRAPPED=ON \
            "${GENERATOR_ARGS[@]}"

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows' && matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: aestival-windows-${{ matrix.compiler }}
          path: bin/aestival.exe

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux' && matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: aestival-linux-${{ matrix.compiler }}
          path: bin/aestival

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS' && matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: aestival-macos-${{ matrix.compiler }}
          path: bin/aestival

      # ── Deploy C++ binary (Linux GCC Release, shinshi only) ──────────
      - name: Deploy C++ binary to server
        if: runner.os == 'Linux' && matrix.compiler == 'gcc' && matrix.build_type == 'Release' && github.event_name == 'push' && github.ref_name == 'shinshi'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "122.51.129.97 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIL05yYQVDpmc3oO21VpAvdaMBPOQeUvpOeihVCar6Msn" > ~/.ssh/known_hosts
          cleanup_keys() { rm -f ~/.ssh/deploy_key ~/.ssh/known_hosts; }
          trap cleanup_keys EXIT

          # 1. Stop service before overwriting binary (avoids ETXTBUSY)
          ssh -i ~/.ssh/deploy_key shinshi@122.51.129.97 "
            export XDG_RUNTIME_DIR=/run/user/\$(id -u)
            systemctl --user stop aestival-bot.service || true
          "

          # 2. Package & push in one compressed pipe
          ssh -i ~/.ssh/deploy_key shinshi@122.51.129.97 "mkdir -p /home/shinshi/aestival/bin/{config,contexts,workspace}"
          tar -czf - -C bin aestival -C .. workspace |
            ssh -i ~/.ssh/deploy_key shinshi@122.51.129.97 "
              tar -xzf - -C /home/shinshi/aestival/bin &&
              mv /home/shinshi/aestival/bin/aestival /home/shinshi/aestival/bin/aestival.new
            "

          # 3. Atomic swap + start
          ssh -i ~/.ssh/deploy_key shinshi@122.51.129.97 "
            mv /home/shinshi/aestival/bin/aestival.new /home/shinshi/aestival/bin/aestival
            export XDG_RUNTIME_DIR=/run/user/\$(id -u)
            systemctl --user start aestival-bot.service
          "

  # ─── Web UI: build + deploy (shinshi only, starts immediately) ──────────
  webui:
    name: web ui · build & deploy
    needs: changes
    if: |
      github.event_name == 'push' &&
      github.ref_name == 'shinshi' &&
      needs.changes.outputs.webui == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── Cache ──────────────────────────────────────────────────────────
      - name: Cache backend node_modules
        uses: actions/cache@v4
        with:
          path: webui/backend/node_modules
          key: webui-backend-${{ runner.os }}-${{ hashFiles('webui/backend/package-lock.json') }}

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: webui/frontend/node_modules
          key: webui-frontend-${{ runner.os }}-${{ hashFiles('webui/frontend/package-lock.json') }}

      # ── Install (parallel) ─────────────────────────────────────────────
      - name: Install deps
        run: |
          (cd webui/backend  && npm ci) &
          (cd webui/frontend && npm ci) &
          wait

      # ── Build (parallel) ───────────────────────────────────────────────
      - name: Build all
        run: |
          (cd webui/backend  && npm run build) &
          (cd webui/frontend && npx tsc --noEmit && npm run build) &
          wait

      # ── Deploy (single tar pipe, single SSH call) ──────────────────────
      #
      # Sends backend/dist + backend/package.json + frontend/dist
      # (~300 KB compressed).  node_modules (~100 MB) is only included
      # when package-lock.json actually changed.
      #
      # Uses a staging dir so the tar has the correct backend/ + frontend/
      # prefix structure matching the server layout.
      - name: Deploy Web UI to server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "122.51.129.97 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIL05yYQVDpmc3oO21VpAvdaMBPOQeUvpOeihVCar6Msn" > ~/.ssh/known_hosts
          cleanup_keys() { rm -f ~/.ssh/deploy_key ~/.ssh/known_hosts; }
          trap cleanup_keys EXIT

          STG="$RUNNER_TEMP/deploy"
          rm -rf "$STG"
          mkdir -p "$STG/backend" "$STG/frontend/dist"
          cp -a webui/backend/dist   "$STG/backend/"      # → $STG/backend/dist/
          cp    webui/backend/package.json "$STG/backend/"
          cp -a webui/frontend/dist/* "$STG/frontend/dist/"

          echo ":: deps changed: ${{ needs.changes.outputs.backend_deps }}"
          if [ "${{ needs.changes.outputs.backend_deps }}" = "true" ]; then
            echo "   including node_modules (~100 MB)"
            cp -a webui/backend/node_modules "$STG/backend/"
          else
            echo "   skipping node_modules"
          fi

          echo ":: deploying ($(du -sh "$STG" | cut -f1))..."
          tar -czf - -C "$STG" backend frontend |
            ssh -i ~/.ssh/deploy_key shinshi@122.51.129.97 "
              set -e
              rm -rf /home/shinshi/aestival/webui/backend/dist
              rm -rf /home/shinshi/aestival/webui/frontend/*
              if [ '${{ needs.changes.outputs.backend_deps }}' = 'true' ]; then
                rm -rf /home/shinshi/aestival/webui/backend/node_modules
              fi
              mkdir -p /home/shinshi/aestival/webui/backend /home/shinshi/aestival/webui/frontend
              tar -xzf - -C /home/shinshi/aestival/webui
              export XDG_RUNTIME_DIR=/run/user/\$(id -u)
              systemctl --user restart aestival-webui.service || true
              systemctl --user --no-pager status aestival-webui.service || true
            "
          echo ":: done"

name: CI

on:
  push:
    branches: [master, main, develop, shinshi]
  pull_request:
    branches: [master, main]

# Prevent concurrent deploys from racing each other.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false  # let every push finish deploying; never leave mixed state

jobs:
  # ─── C++ builds (full matrix, all branches + PRs) ──────────────────────
  cpp-build:
    name: ${{ matrix.os }} · ${{ matrix.compiler }} · ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            compiler: msvc
            build_type: Debug
          - os: windows-latest
            compiler: msvc
            build_type: Release
          - os: windows-latest
            compiler: clang-cl
            build_type: Release
          - os: ubuntu-latest
            compiler: gcc
            build_type: Release
          - os: ubuntu-latest
            compiler: clang
            build_type: Release
          - os: macos-latest
            compiler: apple-clang
            build_type: Release

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        if: runner.os == 'Windows' && matrix.compiler == 'msvc'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Clang (Linux)
        if: runner.os == 'Linux' && matrix.compiler == 'clang'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang

      - name: Setup GCC 14 (Linux)
        if: runner.os == 'Linux' && matrix.compiler == 'gcc'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq g++-14
          echo "CC=gcc-14" >> $GITHUB_ENV
          echo "CXX=g++-14" >> $GITHUB_ENV

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-
            vcpkg-${{ runner.os }}-${{ matrix.compiler }}-

      - name: Install CMake 4.3.3 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = '4.3.3'
          $url = "https://github.com/Kitware/CMake/releases/download/v$version/cmake-$version-windows-x86_64.zip"
          $zip = Join-Path $env:RUNNER_TEMP "cmake-$version-windows-x86_64.zip"
          $root = Join-Path $env:RUNNER_TEMP "cmake-$version"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $root -Force
          "$root\cmake-$version-windows-x86_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install CMake 4.3.3 (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          version=4.3.3
          case "${{ runner.os }}" in
            Linux)
              archive="cmake-$version-linux-x86_64.tar.gz"
              dir="cmake-$version-linux-x86_64"
              ;;
            macOS)
              archive="cmake-$version-macos-universal.tar.gz"
              dir="cmake-$version-macos-universal"
              ;;
            *)
              echo "Unsupported runner.os=${{ runner.os }}"
              exit 1
              ;;
          esac
          url="https://github.com/Kitware/CMake/releases/download/v$version/$archive"
          curl -fsSL "$url" -o "$RUNNER_TEMP/$archive"
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/$dir/bin" >> "$GITHUB_PATH"

      - name: Verify CMake
        shell: bash
        run: cmake --version

      - name: Prepare vcpkg
        shell: bash
        run: |
          if [[ -n "${VCPKG_INSTALLATION_ROOT:-}" ]]; then
            printf 'VCPKG_ROOT=%s\n' "$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"
            if [[ -d "$VCPKG_INSTALLATION_ROOT/.git" ]]; then
              git -C "$VCPKG_INSTALLATION_ROOT" reset --hard
              git -C "$VCPKG_INSTALLATION_ROOT" clean -fdx
              git -C "$VCPKG_INSTALLATION_ROOT" fetch origin master --tags --prune
              git -C "$VCPKG_INSTALLATION_ROOT" checkout -B master FETCH_HEAD
            fi
          fi

      - name: Configure
        shell: bash
        run: |
          GENERATOR_ARGS=()

          case "${{ runner.os }}" in
            Windows)
              case "${{ matrix.compiler }}" in
                clang-cl) GENERATOR_ARGS+=(-T ClangCL) ;;
              esac
              ;;
            Linux)
              case "${{ matrix.compiler }}" in
                clang)
                  GENERATOR_ARGS+=(-DCMAKE_C_COMPILER=clang)
                  GENERATOR_ARGS+=(-DCMAKE_CXX_COMPILER=clang++)
                  ;;
                gcc)
                  GENERATOR_ARGS+=(-DCMAKE_C_COMPILER=gcc-14)
                  GENERATOR_ARGS+=(-DCMAKE_CXX_COMPILER=g++-14)
                  ;;
              esac
              ;;
          esac

          cmake -B build \
            -DCMAKE_PROJECT_NAME=aestival \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DAESTIVAL_WERROR=ON \
            -DVCPKG_BOOTSTRAPPED=ON \
            "${GENERATOR_ARGS[@]}"

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows' && matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: aestival-windows-${{ matrix.compiler }}
          path: bin/aestival.exe

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux' && matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: aestival-linux-${{ matrix.compiler }}
          path: bin/aestival

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS' && matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: aestival-macos-${{ matrix.compiler }}
          path: bin/aestival

      # ── Deploy C++ binary (Linux GCC Release, shinshi only) ──────────
      - name: Deploy C++ binary to server
        if: runner.os == 'Linux' && matrix.compiler == 'gcc' && matrix.build_type == 'Release' && github.event_name == 'push' && github.ref_name == 'shinshi'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "122.51.129.97 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIL05yYQVDpmc3oO21VpAvdaMBPOQeUvpOeihVCar6Msn" > ~/.ssh/known_hosts
          cleanup_keys() { rm -f ~/.ssh/deploy_key ~/.ssh/known_hosts; }
          trap cleanup_keys EXIT

          # 1. Stop service before overwriting binary (avoids ETXTBUSY)
          ssh -i ~/.ssh/deploy_key shinshi@122.51.129.97 "
            export XDG_RUNTIME_DIR=/run/user/\$(id -u)
            systemctl --user stop aestival-bot.service || true
          "

          # 2. Package & push in one compressed pipe
          ssh -i ~/.ssh/deploy_key shinshi@122.51.129.97 "mkdir -p /home/shinshi/aestival/bin/{config,contexts,workspace}"
          tar -czf - -C bin aestival -C .. workspace |
            ssh -i ~/.ssh/deploy_key shinshi@122.51.129.97 "
              tar -xzf - -C /home/shinshi/aestival/bin &&
              mv /home/shinshi/aestival/bin/aestival /home/shinshi/aestival/bin/aestival.new
            "

          # 3. Atomic swap + start
          ssh -i ~/.ssh/deploy_key shinshi@122.51.129.97 "
            mv /home/shinshi/aestival/bin/aestival.new /home/shinshi/aestival/bin/aestival
            export XDG_RUNTIME_DIR=/run/user/\$(id -u)
            systemctl --user start aestival-bot.service
          "

  # ─── Web UI: build + deploy (shinshi only, starts immediately) ──────────
  webui:
    name: Web UI · build & deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # No 'needs' — web UI has zero dependency on C++ builds.
    if: github.event_name == 'push' && github.ref_name == 'shinshi'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── Cache ──────────────────────────────────────────────────────────
      - name: Cache backend node_modules
        uses: actions/cache@v4
        with:
          path: webui/backend/node_modules
          key: webui-backend-${{ runner.os }}-${{ hashFiles('webui/backend/package-lock.json') }}

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: webui/frontend/node_modules
          key: webui-frontend-${{ runner.os }}-${{ hashFiles('webui/frontend/package-lock.json') }}

      # ── Install (parallel) ─────────────────────────────────────────────
      - name: Install deps
        run: |
          (cd webui/backend  && npm ci) &
          (cd webui/frontend && npm ci) &
          wait

      # ── Build (parallel) ───────────────────────────────────────────────
      - name: Build backend
        working-directory: webui/backend
        run: npm run build

      - name: Build frontend (type-check + vite)
        working-directory: webui/frontend
        run: npx tsc --noEmit && npm run build

      # ── Deploy ─────────────────────────────────────────────────────────
      - name: Deploy Web UI to server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "122.51.129.97 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIL05yYQVDpmc3oO21VpAvdaMBPOQeUvpOeihVCar6Msn" > ~/.ssh/known_hosts
          cleanup_keys() { rm -f ~/.ssh/deploy_key ~/.ssh/known_hosts; }
          trap cleanup_keys EXIT

          REMOTE="shinshi@122.51.129.97"
          REMOTE_DIR="/home/shinshi/aestival/webui"
          FRONTEND_HTML="/home/shinshi/aestival/webui/frontend"

          ssh -i ~/.ssh/deploy_key "$REMOTE" "mkdir -p $REMOTE_DIR/backend $FRONTEND_HTML"

          # 1. Deploy backend
          echo ":: deploying backend..."
          ssh -i ~/.ssh/deploy_key "$REMOTE" "
            rm -rf '$REMOTE_DIR/backend/dist' '$REMOTE_DIR/backend/node_modules.old' 2>/dev/null || true
          "
          cd webui/backend
          tar -czf "$RUNNER_TEMP/webui-backend.tar.gz" dist/ package.json node_modules/
          cd ../..
          cat "$RUNNER_TEMP/webui-backend.tar.gz" |
            ssh -i ~/.ssh/deploy_key "$REMOTE" "tar -xzf - -C $REMOTE_DIR/backend"

          # 2. Deploy frontend (static files)
          echo ":: deploying frontend..."
          ssh -i ~/.ssh/deploy_key "$REMOTE" "rm -rf '$FRONTEND_HTML/'* 2>/dev/null || true"
          cd webui/frontend
          tar -czf "$RUNNER_TEMP/webui-frontend.tar.gz" dist/
          cd ../..
          cat "$RUNNER_TEMP/webui-frontend.tar.gz" |
            ssh -i ~/.ssh/deploy_key "$REMOTE" "tar -xzf - -C $FRONTEND_HTML"

          # 3. Restart Web UI backend service
          echo ":: restarting webui service..."
          ssh -i ~/.ssh/deploy_key "$REMOTE" "
            export XDG_RUNTIME_DIR=/run/user/\$(id -u)
            systemctl --user restart aestival-webui.service || true
            systemctl --user --no-pager status aestival-webui.service || true
          "

          echo ":: Web UI deployed"

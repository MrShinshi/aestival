# Nginx reverse proxy for aestival Web UI
#
# Place at: /etc/nginx/sites-available/aestival
# Enable:    ln -s /etc/nginx/sites-available/aestival /etc/nginx/sites-enabled/
# Test:      nginx -t
# Reload:    nginx -s reload

upstream webui_backend {
    server 127.0.0.1:3000;
}

upstream bot_api {
    server 127.0.0.1:9090;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;  # CHANGE ME

    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Web UI — frontend static files
    root /home/shinshi/aestival/webui/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Web UI — backend API (OAuth, proxy, logs, conversations)
    location /api/ui/ {
        proxy_pass http://webui_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Bot management API (direct proxy — JWT required)
    # NOTE: only enable this if you want direct external access to the bot API.
    # For security, keep the bot API on 127.0.0.1 and route through the Web UI backend.
    # location /api/v1/ {
    #     proxy_pass http://bot_api;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    # }

    # gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name your-domain.com;  # CHANGE ME
    return 301 https://$host$request_uri;
}
